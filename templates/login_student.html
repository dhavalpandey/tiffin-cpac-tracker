{% extends 'base.html' %} {% block content %}
<div
	style="
		max-width: 420px;
		margin: 3rem auto;
		background: white;
		padding: 3rem 2.5rem;
		border-radius: 12px;
		box-shadow: 0 8px 25px rgba(0, 0, 0, 0.06);
	">
	<h2 style="margin-top: 0; margin-bottom: 2rem; text-align: center">
		Student Login
	</h2>
	<form method="POST">
		<label>First Name</label>
		<input type="text" name="first_name" required />
		<label>Surname (Last Name)</label>
		<input type="text" name="last_name" required />
		<label>Year Group</label>
		<select name="year_group" required>
			<option value="" disabled selected>Select Year...</option>
			<option value="12">Year 12</option>
			<option value="13">Year 13</option>
		</select>
		<button
			type="submit"
			class="btn"
			style="
				width: 100%;
				margin-top: 1rem;
				padding: 0.8rem;
				font-size: 1.05rem;
			">
			View My CPACs
		</button>
	</form>
	<p style="text-align: center; margin-top: 2rem">
		<a
			href="{{ url_for('home') }}"
			style="
				color: var(--primary);
				text-decoration: none;
				font-weight: 500;
			"
			>&larr; Back to Home</a
		>
	</p>
</div>
{% endblock %}
