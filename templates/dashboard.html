{% extends 'base.html' %} {% block content %}
<style>
	.carousel {
		display: flex;
		flex-wrap: wrap;
		gap: 1.5rem;
		padding-bottom: 1.5rem;
		margin-bottom: 3rem;
	}
	.card {
		flex: 1;
		min-width: 280px;
		max-width: 400px;
		background: white;
		padding: 2rem;
		border-radius: 12px;
		box-shadow: 0 4px 15px rgba(0, 0, 0, 0.04);
		border-left: 6px solid var(--primary);
		display: flex;
		flex-direction: column;
		justify-content: space-between;
	}
	.card h3 {
		margin-top: 0;
		font-size: 1.5rem;
		margin-bottom: 0.5rem;
	}
	.section-header {
		display: flex;
		justify-content: space-between;
		align-items: center;
		margin-bottom: 1.5rem;
		margin-top: 1rem;
	}
</style>

<div class="section-header">
	<h2 style="margin: 0">Cohorts Dashboard</h2>
	<div style="display: flex; gap: 1rem">
		<a
			href="{{ url_for('export_data') }}"
			class="btn btn-outline"
			style="display: flex; align-items: center; gap: 0.5rem">
			<svg
				xmlns="http://www.w3.org/2000/svg"
				width="16"
				height="16"
				fill="currentColor"
				viewBox="0 0 16 16">
				<path
					d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z" />
				<path
					d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z" />
			</svg>
			Export All Data
		</a>
		<button
			class="btn"
			onclick="
				document.getElementById('addCohortModal').style.display = 'flex'
			">
			+ Add Year Group
		</button>
	</div>
</div>

<div class="carousel">
	{% for c in cohorts %}
	<div class="card">
		<div>
			<h3>{{ c.title }}</h3>
			<p style="color: #6c757d; margin-top: 0">{{ c.years }}</p>
			<p style="font-size: 1.1rem">
				<strong>{{ c.student_count }}</strong> Students
			</p>
		</div>
		<div style="display: flex; gap: 0.5rem; margin-top: 1rem">
			<a
				href="{{ url_for('cohort_view', id=c.id) }}"
				class="btn"
				style="flex: 1; text-align: center"
				>View</a
			>
			<form
				method="POST"
				action="{{ url_for('delete_cohort', id=c.id) }}"
				onsubmit="
					return confirm(
						'WARNING: Are you sure you want to delete this entire cohort? All students and their marks will be lost forever.',
					);
				"
				style="margin: 0">
				<button
					type="submit"
					class="btn btn-danger"
					style="height: 100%">
					Delete
				</button>
			</form>
		</div>
	</div>
	{% endfor %}
</div>

<div id="addCohortModal" class="modal">
	<div class="modal-content" style="width: 350px">
		<h3 style="margin-top: 0">Add Cohort</h3>
		<form method="POST" action="{{ url_for('add_cohort') }}">
			<label>Start Year</label>
			<input type="number" name="start_year" required />
			<label>End Year</label>
			<input type="number" name="end_year" required />
			<div
				style="
					display: flex;
					justify-content: flex-end;
					gap: 1rem;
					margin-top: 1rem;
				">
				<button
					type="button"
					class="btn btn-outline"
					onclick="
						document.getElementById(
							'addCohortModal',
						).style.display = 'none'
					">
					Cancel
				</button>
				<button type="submit" class="btn">Save</button>
			</div>
		</form>
	</div>
</div>
{% endblock %}
